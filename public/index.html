<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTZ Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="icon">🚆</span> KTZ <strong>Analytics</strong>
                <span class="live-indicator">● LIVE</span>
            </div>
            <div class="date-display" id="currentDate"></div>
        </header>

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="card kpi-card">
                <h3>Всего обращений</h3>
                <div class="value" id="totalReports">0</div>
                <div class="subtext">За все время</div>
            </div>
            <div class="card kpi-card critical">
                <h3>Критические</h3>
                <div class="value" id="totalCritical">0</div>
                <div class="subtext">Требуют внимания</div>
            </div>
            <div class="card kpi-card warning">
                <h3>Проблемный поезд</h3>
                <div class="value small" id="topTrain">N/A</div>
                <div class="subtext">Больше всего жалоб</div>
            </div>
        </div>

        <!-- Charts Grid 1 -->
        <div class="charts-grid">
            <div class="card chart-card wide">
                <h3>📉 Динамика обращений (30 дней)</h3>
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- Charts Grid 2 -->
        <div class="charts-grid two-col">
            <div class="card chart-card">
                <h3>📊 Категории</h3>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="card chart-card">
                <h3>🏢 Филиалы</h3>
                <canvas id="branchChart"></canvas>
            </div>
        </div>
        
    </div>
    <script src="app.js"></script>
</body>
</html>
